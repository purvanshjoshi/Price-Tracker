name: "Update Changelog"

on:
  workflow_run:
    workflows: ["Avengers Guard"]
    types: [completed]
    branches: [master]

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}

jobs:
  changelog:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: master

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Create changelog PR
        run: |
          if [ -z "$(git status --porcelain -- CHANGELOG.md)" ]; then
            echo "No changelog changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="auto-changelog"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "chore: update changelog"
          git push origin "$BRANCH" --force

          if PR_URL=$(gh pr view "$BRANCH" --json url --jq '.url' 2>/dev/null); then
            echo "PR already exists: $PR_URL"
          else
            gh pr create \
              --title "chore: update changelog" \
              --body "Automated changelog update generated by [git-cliff](https://github.com/orhun/git-cliff)." \
              --label "documentation" \
              --base master \
              --head "$BRANCH" || echo "::warning::Could not create PR. Ensure 'Allow GitHub Actions to create PRs' is enabled in repo settings, or add a PAT_TOKEN secret."
          fi
