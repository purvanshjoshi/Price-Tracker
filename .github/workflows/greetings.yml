name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: 'Welcome to the Price Scout community! 🚀 Thank you for opening your first issue. Our team (The Avengers) will review it soon!'
        pr-message: 'Welcome to Price Scout! 🧪 Thank you for your first pull request. We appreciate your contribution to the engine!'
