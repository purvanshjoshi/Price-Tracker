name: "🛡️ Avengers Guard"

on:
  pull_request:
    branches: [ master ]
    types: [opened, edited, synchronize, reopened]

jobs:
  # 1. Validate PR Title (Semantic Naming)
  naming_standard:
    name: "📛 Naming Standard"
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert

  # 2. Analyze PR Complexity (Size Labeling)
  complexity_analytics:
    name: "📊 Complexity Analytics"
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1.10.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: '15'
          s_max_size: '150'
          m_max_size: '600'
          l_max_size: '1200'

  # 3. Security Vulnerability Scan
  security_scan:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  # 4. Java Code Style Guard
  style_guard:
    name: "✨ Style Guard"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Checkstyle
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.github_token }}
          checkstyle_config: checkstyle.xml
          level: warning

  # 5. Full Engine Build Verification
  engine_build:
    name: "🧪 Engine Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: |
          cd backend
          mvn -B clean package --file pom.xml
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PriceTrackerEngine
          path: backend/target/PriceTrackerEngine.jar
