name: "PR Size Labeler"

on: pull_request

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1.10.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: '10'
          s_max_size: '100'
          m_max_size: '500'
          l_max_size: '1000'
          fail_if_xl: 'false'
          message_if_xl: 'This PR is quite large, please consider breaking it down into smaller ones!'
