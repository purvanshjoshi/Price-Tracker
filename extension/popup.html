<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Price Scout</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Price Scout</h1>
            <p>Cloud-Engine Intelligence</p>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search product name..." autofocus>
            <button id="searchBtn">Search</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Scouting stores...</p>
        </div>

        <div id="error" class="error hidden"></div>

        <div id="resultsContainer" class="hidden">
            <div class="controls">
                <select id="sortSelect">
                    <option value="cheapest">Price: Low to High</option>
                    <option value="priciest">Price: High to Low</option>
                    <option value="platform-az">Store: A-Z</option>
                </select>
                <input type="text" id="filterInput" placeholder="Filter results...">
            </div>
            
            <p id="resultCount"></p>

            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Store</th>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <!-- Results injected here -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
